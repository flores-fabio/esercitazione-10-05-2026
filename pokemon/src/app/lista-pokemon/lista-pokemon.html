<h2>Pokèmon di tipo: {{tipoSelezionato}}</h2>
@if (loading) {
    <div>Caricamento Pokèmon...</div>
}
@else{
    <ul>
        @for (p of pokemonList; track p.pokemon.name){
            <li>
                <a [routerLink] = "['/dettagli', p.pokemon.name]">
                    {{p.pokemon.name}}
                </a>
            </li>
        }
    </ul>
}

<button routerLink="/tipi">Torna alla lista tipi</button>
